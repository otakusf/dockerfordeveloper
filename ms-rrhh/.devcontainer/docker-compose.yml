services:

  quarkus-dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    ports:
      - "8080:8080"
      - "5005:5005"
    networks:
      - devnet

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: quarkusdb
      POSTGRES_USER: quarkus
      POSTGRES_PASSWORD: quarkus
    ports:
      - "5432:5432"
    networks:
      - devnet

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    networks:
      - devnet

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace
    networks:
      - devnet

networks:
  devnet:

volumes:
  postgres-data:
  cloudbeaver-data: