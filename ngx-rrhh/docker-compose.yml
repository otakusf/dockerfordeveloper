version: '3'

services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: ngx-rrhh-frontend
    volumes:
      - .:/workspace
      - /workspace/node_modules
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=development
      - API_URL=http://localhost:3001/api
    command: npm start
